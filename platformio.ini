[platformio]
default_envs = cyd-2432s028

[env]
platform = espressif32@6.9.0
framework = arduino
monitor_speed = 115200
extra_scripts =
  pre:scripts/set_version.py

lib_deps =
  bodmer/TFT_eSPI @ ^2.5.43
  paulstoffregen/XPT2046_Touchscreen
  lvgl/lvgl @ ^8.3.11
  bblanchon/ArduinoJson @ ^7.1.0
  tzapu/WiFiManager @ ^2.0.17

build_flags =
  -D LV_CONF_INCLUDE_SIMPLE=1
  -D LV_CONF_PATH=${PROJECT_DIR}/include/lv_conf.h

[env:cyd-2432s028]
board = esp32dev
; Default OTA partition scheme only gives ~1.25MB per app slot - WiFiManager
; + WebServer + Update push us right up against that limit, and OTA needs
; the update to also fit in the other (currently inactive) slot. min_spiffs
; keeps two OTA slots but grows them to ~1.9MB each (we don't use SPIFFS,
; storage is the SD card, so shrinking it to the minimum costs nothing).
board_build.partitions = min_spiffs.csv
build_flags =
  ${env.build_flags}
  -D BOARD_PROFILE_CYD_2432S028=1
  -include ${PROJECT_DIR}/include/boards/cyd_2432s028.h
